name: Build and Deploy Marketing Site
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_MAIN_DOMAIN: ${{ secrets.VITE_MAIN_DOMAIN }}
          VITE_TENANT_APP_URL: ${{ secrets.VITE_TENANT_APP_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      - name: Prepare target directory on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/talentcio/marketing/dist
            sudo chown -R $USER:$USER /var/www/talentcio/marketing/dist
      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/talentcio/marketing/dist/"
          strip_components: 1
          overwrite: true
      - name: Fix permissions and reload Nginx
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/talentcio/marketing/dist
            sudo find /var/www/talentcio/marketing/dist -type d -exec chmod 755 {} \;
            sudo find /var/www/talentcio/marketing/dist -type f -exec chmod 644 {} \;
            sudo systemctl reload nginx
